version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto8

  pre_build:
    commands:
      - echo "Initializing environment"
      - export CODEARTIFACT_AUTH_TOKEN=$(aws codeartifact get-authorization-token --domain lankirix-nextwork-domain --domain-owner 064370794857 --query authorizationToken --output text)
      - echo "Checking if settings.xml exists..."
      - ls -l $CODEBUILD_SRC_DIR/settings.xml || echo "settings.xml NOT FOUND!"  # Debugging check
      - ls -l $CODEBUILD_SRC_DIR/nextwork-devops-webapp/  # Debugging check

  build:
    commands:
      - echo "Build started on $(date)"
      - cd $CODEBUILD_SRC_DIR/nextwork-devops-webapp  # Ensure correct directory
      - mvn -s $CODEBUILD_SRC_DIR/settings.xml clean compile  # Absolute path to settings.xml

  post_build:
    commands:
      - echo "Build completed on $(date)"
      - cd $CODEBUILD_SRC_DIR/nextwork-devops-webapp
      - mvn -s $CODEBUILD_SRC_DIR/settings.xml package  # Ensure correct settings.xml reference

artifacts:
  files:
    - nextwork-devops-webapp/target/nextwork-web-project.war
  discard-paths: no
